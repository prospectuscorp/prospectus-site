<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PROSPECTUS — The Business of Sport</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --pitch:   #F7F4EE;
  --blue:    #1C2541;
  --ink:     #5A5A5A;
  --border:  rgba(11,11,11,0.08);
  --border2: rgba(11,11,11,0.16);
  --cream:   #0B0B0B;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body {
  height:100%;
  background:var(--pitch);
  color:var(--cream);
  font-family:'Space Grotesk',sans-serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100svh;
  padding:2rem;
}

.wrap {
  display:flex; flex-direction:column;
  align-items:center; gap:3rem;
  width:100%; max-width:480px;
  text-align:center;
}

.logo {
  font-weight:700; font-size:2.6rem;
  letter-spacing:.3em; text-transform:uppercase;
  color:var(--cream);
}

.tagline {
  font-weight:300; font-size:.82rem;
  color:var(--ink); letter-spacing:.04em;
  text-align:center; line-height:1.7;
  margin-top:-.5rem;
}

.links {
  display:flex; flex-direction:column;
  gap:.75rem; width:100%;
}

.link {
  display:flex; align-items:center; gap:1rem;
  padding:1.2rem 1.5rem;
  border:2px solid var(--blue);
  background:#fff;
  text-decoration:none;
  transition:border-color .18s, background .18s;
  cursor:pointer;
}

.link:hover {
  border-color:var(--border2);
  background:var(--pitch);
}

.link-icon {
  width:32px; height:32px; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}

.link-icon svg { width:15px; height:15px; fill:#fff; }
.link-icon.yt { background:#FF0000; }
.link-icon.x  { background:#000; }
.link-icon.ig { background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); }
.link-icon.tt { background:#010101; }

.link-text { flex:1; }
.link-name {
  font-weight:700; font-size:.72rem;
  letter-spacing:.16em; text-transform:uppercase;
  color:var(--cream);
}
.link-handle {
  font-size:.58rem; color:var(--ink);
  margin-top:.15rem;
}

.link-arrow {
  font-size:.75rem; color:var(--ink);
  transition:transform .18s;
}
.link:hover .link-arrow { transform:translateX(3px); }

.foot {
  font-size:.5rem; color:var(--ink);
  letter-spacing:.1em; text-transform:uppercase;
}
</style>
</head>
